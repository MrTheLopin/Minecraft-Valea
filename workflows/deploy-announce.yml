name: Annonce de mise à jour du site

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/data/server-status.json'   # évite une annonce à chaque check de statut

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Envoyer l'annonce sur Discord
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          # Échappe les guillemets et retours à la ligne pour un JSON valide
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -c 300 | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"embeds\":[{\"title\":\"✨ Le site de Valéa a été mis à jour\",\"description\":\"$SAFE_MSG\",\"url\":\"$COMMIT_URL\",\"color\":15637171,\"footer\":{\"text\":\"par $COMMIT_AUTHOR\"}}]}" \
            "${{ secrets.DISCORD_LOGS_WEBHOOK }}"
